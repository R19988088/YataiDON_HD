name: Build YataiDON (Release)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Configure Git credentials
        run: |
          git config --global url."https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@ese.tjadataba.se/".insteadOf "https://ese.tjadataba.se/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule hash
        id: submod
        run: echo "sha=$(git ls-tree HEAD Skins/PyTaikoGreen | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache submodule
        id: cache-submod
        uses: actions/cache@v4
        with:
          path: Skins/PyTaikoGreen
          key: submod-pytaikogreen-${{ steps.submod.outputs.sha }}

      - name: Fetch submodule
        if: steps.cache-submod.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            zip \
            patchelf \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libjack-dev \
            liblua5.4-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            libogg-dev \
            libvorbis-dev \
            libflac-dev \
            libopus-dev \
            libmp3lame-dev \
            libmpg123-dev \
            libspeex-dev \
            libdw-dev

      - name: Setup SDL3
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          install-linux-dependencies: true
          version: 3-head
          build-type: Release

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        run: |
          mkdir -p release/YataiDON-Linux
          cp build/bin/YataiDON release/YataiDON-Linux/
          cp -r Skins release/YataiDON-Linux/
          cp -r shader release/YataiDON-Linux/
          cp -r Songs release/YataiDON-Linux/
          cp config.toml release/YataiDON-Linux/
          cp FZPangWaUltra-Regular.ttf release/YataiDON-Linux/
          cp update.sh release/YataiDON-Linux/
          chmod +x release/YataiDON-Linux/YataiDON release/YataiDON-Linux/update.sh

          # Bundle FFmpeg shared libraries into lib/
          mkdir -p release/YataiDON-Linux/lib
          ldd build/bin/YataiDON | grep -E "(libav|libsw).*=>" | awk '{print $3}' | \
            xargs -I{} cp -L {} release/YataiDON-Linux/lib/

          # Bundle sndfile codec dependencies (ogg, vorbis, FLAC, opus, mp3, etc.)
          ldd build/bin/YataiDON | grep -E "(libsndfile|libogg|libvorbis|libFLAC|libopus|libmp3lame|libmpg123|libspeex).*=>" | awk '{print $3}' | \
            grep -v "^$" | xargs -I{} cp -L {} release/YataiDON-Linux/lib/ 2>/dev/null || true

          # Bundle SDL3 shared library
          ldd build/bin/YataiDON | grep -E "libSDL3.*=>" | awk '{print $3}' | \
            grep -v "^$" | xargs -I{} cp -L {} release/YataiDON-Linux/lib/ 2>/dev/null || true

          # Bundle transitive deps of FFmpeg AND sndfile codec libs
          for so in release/YataiDON-Linux/lib/lib{av,sw,ogg,vorbis,FLAC,opus,mp3lame,mpg123,speex,SDL3}*.so*; do
            ldd "$so" 2>/dev/null | grep "=>" | awk '{print $3}' | grep -v "^$" | \
              grep -vE "lib(c\.so|m\.so|dl\.so|rt\.so|pthread\.so|gcc_s\.so|stdc\+\+\.so|X11\.so|GL\.so|asound\.so|pulse\.so|jack\.so|Xi\.so|Xrandr\.so|xcb)" | \
              grep -v "ld-linux" | \
              xargs -I{} cp -L {} release/YataiDON-Linux/lib/ 2>/dev/null || true
          done

          # Patch rpath: binary looks in $ORIGIN/lib, bundled .so files look in $ORIGIN
          patchelf --set-rpath '$ORIGIN/lib' release/YataiDON-Linux/YataiDON
          for so in release/YataiDON-Linux/lib/*.so*; do
            [ -f "$so" ] && patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          # Checksums — binary + updater + shader + lib
          (
            cd release/YataiDON-Linux
            sha256sum YataiDON update.sh FZPangWaUltra-Regular.ttf
            find shader -type f | sort | xargs sha256sum
            [ -d lib ] && find lib -type f | sort | xargs sha256sum || true
          ) > release/YataiDON-Linux/checksums-linux.sha256

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-Linux
          path: release/YataiDON-Linux/
          if-no-files-found: error

  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure Git credentials
        shell: bash
        run: |
          git config --global url."https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@ese.tjadataba.se/".insteadOf "https://ese.tjadataba.se/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule hash
        id: submod
        shell: bash
        run: echo "sha=$(git ls-tree HEAD Skins/PyTaikoGreen | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache submodule
        id: cache-submod
        uses: actions/cache@v4
        with:
          path: Skins/PyTaikoGreen
          key: submod-pytaikogreen-${{ steps.submod.outputs.sha }}

      - name: Fetch submodule
        if: steps.cache-submod.outputs.cache-hit != 'true'
        shell: bash
        run: git submodule update --init --recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-libsamplerate
            mingw-w64-x86_64-lua
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-sdl3
            zip
            make

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        shell: bash
        run: |
          mkdir -p release/YataiDON-Windows
          cp build/bin/YataiDON.exe release/YataiDON-Windows/
          cp build/bin/*.dll release/YataiDON-Windows/ 2>/dev/null || true
          cp -r Skins release/YataiDON-Windows/
          cp -r shader release/YataiDON-Windows/
          cp -r Songs release/YataiDON-Windows/
          cp config.toml release/YataiDON-Windows/
          cp FZPangWaUltra-Regular.ttf release/YataiDON-Windows/
          cp update.ps1 update.bat release/YataiDON-Windows/

          # Checksums — binary + updater + dlls + shader
          (
            cd release/YataiDON-Windows
            sha256sum YataiDON.exe update.ps1 update.bat FZPangWaUltra-Regular.ttf
            find shader -type f | sort | xargs sha256sum
            find . -maxdepth 1 -name "*.dll" | sort | xargs sha256sum
          ) > release/YataiDON-Windows/checksums-windows.sha256

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-Windows
          path: release/YataiDON-Windows/
          if-no-files-found: error

  build-macos:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Configure Git credentials
        run: |
          git config --global credential.helper ""
          git config --global url."https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@ese.tjadataba.se/".insteadOf "https://ese.tjadataba.se/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule hash
        id: submod
        run: echo "sha=$(git ls-tree HEAD Skins/PyTaikoGreen | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache submodule
        id: cache-submod
        uses: actions/cache@v4
        with:
          path: Skins/PyTaikoGreen
          key: submod-pytaikogreen-${{ steps.submod.outputs.sha }}

      - name: Fetch submodule
        if: steps.cache-submod.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          brew install \
            cmake \
            ninja \
            pkg-config \
            ffmpeg \
            sdl3 \
            dylibbundler \
            libogg \
            libvorbis \
            flac \
            opus \
            lame \
            mpg123 \
            speex \
            libsndfile

      - name: Configure CMake
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release package
        run: |
          mkdir -p release/YataiDON-macOS
          cp build/bin/YataiDON release/YataiDON-macOS/
          cp -r Skins release/YataiDON-macOS/
          cp -r shader release/YataiDON-macOS/
          cp -r Songs release/YataiDON-macOS/
          cp config.toml release/YataiDON-macOS/
          cp FZPangWaUltra-Regular.ttf release/YataiDON-macOS/
          cp update.sh release/YataiDON-macOS/
          chmod +x release/YataiDON-macOS/YataiDON release/YataiDON-macOS/update.sh

          # Bundle non-system dylib dependencies
          mkdir -p release/YataiDON-macOS/lib
          dylibbundler -od -b \
            -x release/YataiDON-macOS/YataiDON \
            -d release/YataiDON-macOS/lib \
            -p @executable_path/lib

          # Checksums — binary + updater + shader + lib
          (
            cd release/YataiDON-macOS
            shasum -a 256 YataiDON update.sh FZPangWaUltra-Regular.ttf
            find shader -type f | sort | xargs shasum -a 256
            [ -d lib ] && find lib -type f | sort | xargs shasum -a 256 || true
          ) > release/YataiDON-macOS/checksums-macos.sha256

          hdiutil create \
            -volname YataiDON \
            -srcfolder release/YataiDON-macOS \
            -ov \
            -format UDZO \
            release/YataiDON-macOS.dmg

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: YataiDON-macOS.dmg
          path: release/YataiDON-macOS.dmg
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Configure Git credentials
        run: |
          git config --global url."https://${{ secrets.GITEA_USER }}:${{ secrets.GITEA_TOKEN }}@ese.tjadataba.se/".insteadOf "https://ese.tjadataba.se/"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Get submodule hash
        id: submod
        run: echo "sha=$(git ls-tree HEAD Skins/PyTaikoGreen | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache submodule
        id: cache-submod
        uses: actions/cache@v4
        with:
          path: Skins/PyTaikoGreen
          key: submod-pytaikogreen-${{ steps.submod.outputs.sha }}

      - name: Fetch submodule
        if: steps.cache-submod.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install NDK r27d and CMake 3.22.1
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses >/dev/null 2>&1 || true
          $SDKMANAGER "ndk;27.3.13750724" "cmake;3.22.1"

      - name: Cache FFmpeg for Android arm64
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: .android-ffmpeg
          key: android-ffmpeg-${{ hashFiles('tools/build_ffmpeg_android.sh') }}

      - name: Build FFmpeg for Android
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.3.13750724
          bash tools/build_ffmpeg_android.sh

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: .cmake-deps
          key: android-cmake-deps-${{ hashFiles('cmake/deps.cmake') }}
          restore-keys: android-cmake-deps-

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/3.22.1" >> android/local.properties

      - name: Decode keystore
        run: |
          STORE_TYPE="${{ secrets.ANDROID_KEYSTORE_TYPE }}"
          if [ -z "$STORE_TYPE" ]; then
            STORE_TYPE="jks"
          fi
          STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || [ -z "$STORE_PASSWORD" ]; then
            echo "::warning::Android release signing secrets are missing; using the fixed CI release keystore."
            printf 'storeFile=yataidon-ci-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\nstoreType=%s\n' \
              "yataidon-ci-release" \
              "yataidon-ci" \
              "yataidon-ci-release" \
              "jks" \
              > android/keystore.properties
            exit 0
          fi

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/yataidon-release.jks

          if [ -z "$KEY_ALIAS" ]; then
            KEY_ALIAS="$(keytool -list -v \
              -keystore android/yataidon-release.jks \
              -storepass "$STORE_PASSWORD" \
              -storetype "$STORE_TYPE" \
              | awk -F': ' '/Alias name:/{print $2; exit}')"
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::ANDROID_KEY_ALIAS is empty and no alias could be read from the release keystore."
            exit 1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            KEY_PASSWORD="$STORE_PASSWORD"
          fi

          printf 'storeFile=yataidon-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\nstoreType=%s\n' \
            "$STORE_PASSWORD" \
            "$KEY_ALIAS" \
            "$KEY_PASSWORD" \
            "$STORE_TYPE" \
            > android/keystore.properties

      - name: Patch config for Android
        run: sed -i 's/^touch_input = false/touch_input = true/' config.toml

      - name: Build Release APK
        id: android_apk
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon
          mkdir -p android-apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk android-apk/YataiDON-Android.apk
            echo "artifact_name=YataiDON-Android.apk" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No signed Android release APK was produced."
            find app/build/outputs/apk -type f -maxdepth 5 || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.android_apk.outputs.artifact_name }}
          path: android/android-apk/${{ steps.android_apk.outputs.artifact_name }}
          if-no-files-found: error

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-android]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Linux build: ${{ needs.build-linux.result }}"
          echo "Windows build: ${{ needs.build-windows.result }}"
          echo "macOS build: ${{ needs.build-macos.result }}"
          echo "Android build: ${{ needs.build-android.result }}"

          if [[ "${{ needs.build-linux.result }}" != "success" ]] || \
             [[ "${{ needs.build-windows.result }}" != "success" ]] || \
             [[ "${{ needs.build-macos.result }}" != "success" ]] || \
             [[ "${{ needs.build-android.result }}" != "success" ]]; then
            echo "One or more builds failed!"
            exit 1
          fi

          echo "All builds completed successfully!"

  release:
    needs: [build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: YataiDON-*
          path: release-assets/

      - name: Package release assets
        run: |
          (cd release-assets/YataiDON-Linux && zip -r ../../YataiDON-Linux.zip .)
          (cd release-assets/YataiDON-Windows && zip -r ../../YataiDON-Windows.zip .)
          find release-assets -type f \( -name 'YataiDON-macOS.dmg' -o -name 'YataiDON-Android*.apk' \) -print -exec cp {} . \;
          sha256sum YataiDON-* > checksums-release.sha256

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YataiDON-Linux.zip
            YataiDON-Windows.zip
            YataiDON-macOS.dmg
            YataiDON-Android*.apk
            checksums-release.sha256
          name: "YataiDON [Latest Release]"
          tag_name: "latest"
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
